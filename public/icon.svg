<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff1f7a"/>
      <stop offset="50%" stop-color="#ff4081"/>
      <stop offset="100%" stop-color="#c2185b"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5f8"/>
      <stop offset="100%" stop-color="#ffd2e1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g opacity="0.5">
    <circle cx="80" cy="100" r="3" fill="#ffe66d"/>
    <circle cx="430" cy="80" r="2" fill="#fff"/>
    <circle cx="120" cy="420" r="2.5" fill="#fff"/>
    <circle cx="420" cy="430" r="3" fill="#ffe66d"/>
    <circle cx="60" cy="260" r="2" fill="#fff"/>
    <circle cx="455" cy="270" r="2.5" fill="#ffe66d"/>
  </g>
  <path d="M 256 380
           C 220 350, 130 290, 130 215
           C 130 175, 162 145, 200 145
           C 225 145, 245 158, 256 178
           C 267 158, 287 145, 312 145
           C 350 145, 382 175, 382 215
           C 382 290, 292 350, 256 380 Z"
        fill="url(#heart)" filter="url(#glow)" opacity="0.85"/>
  <path d="M 256 380
           C 220 350, 130 290, 130 215
           C 130 175, 162 145, 200 145
           C 225 145, 245 158, 256 178
           C 267 158, 287 145, 312 145
           C 350 145, 382 175, 382 215
           C 382 290, 292 350, 256 380 Z"
        fill="url(#heart)"/>
  <text x="256" y="90" text-anchor="middle"
        font-family="Georgia, serif" font-size="46" font-weight="700"
        fill="#fff5f8" letter-spacing="6">VELVET</text>
